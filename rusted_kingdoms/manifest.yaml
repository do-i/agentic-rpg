id: my_rpg_story
name: "Chronicles of the Lost Flame"
version: "1.0.0"

protagonist:
  id: hero_aric
  name: "Aric"  # player-renameable in New Game flow
  class: hero
  character: data/characters/aric.yaml
  sprite: sprites/hero.png

start:
  map: town_01_ardel
  position: [12, 8]
  intro_dialogue: data/dialogue/intro_cutscene.yaml

bootstrap_flags:
  - story_quest_started

engine_managed_flags:
  - story_act2_started
  - story_act3_started
  - story_act4_started
  
refs:
  party:      data/party.yaml
  characters: data/characters/
  classes:    data/classes/
  maps:       data/maps/
  dialogue:   data/dialogue/
  items:      data/items/
  enemies:    data/enemies/
  encount:    data/encount/
  recipe:     data/recipe/