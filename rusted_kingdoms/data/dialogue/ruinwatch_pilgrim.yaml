# data/dialogue/ruinwatch_pilgrim.yaml
#
# Flavor NPC: a pilgrim come to pray at the ruins above Ruinwatch.
id: ruinwatch_pilgrim
type: npc

entries:
  - condition:
      requires: [story_act3_started]
    lines:
      - "They say the Flame's being gathered back, piece by piece. I walked three hundred miles to see it."
      - "Don't tell me it isn't true. I've nothing else left to walk toward."

  - lines:
      - "I came to pray at the old sanctum. The monks turned me back — the ruins aren't safe."
      - "So I pray at the gate instead. The Flame hears gates too, I should think."
