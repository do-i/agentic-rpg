entries:
  - lines:
      - "Trail Marker — Mountain Foothills"
      - "The land tilts upward here, toward the frozen kingdom above. The air thins; so does the warmth."
      - "Footing is loose on the climb. Rest when you can — the passes ahead show no mercy."
