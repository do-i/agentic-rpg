entries:
  - lines:
      - "Trail Marker — Windcut Shelf"
      - "A narrow ledge scoured bare by the mountain wind. Hold to the rock face; the drop does not forgive."
      - "The frozen kingdom is closer now. So is the cold that keeps it."
