entries:
  - lines:
      - "Trail Marker — Starting Forest"
      - "North of Ardel. The trees greyed overnight and the beasts came back twisted. Rustkin roam where the rot runs deepest."
      - "Clear a path through and the forest may quiet again. Don't stray deep until you're ready."
