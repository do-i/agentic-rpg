# story_content/dialogue/jep_join.yaml
id: jep_join
type: npc
entries:
  - condition:
      requires: [story_act3_started]
      excludes: [npc_jep_joined]
    lines:
      - "Okay, okay — I wasn't stealing. I was borrowing. From a ruin. That's basically archaeology."
      - "Look, you clearly need someone who knows this place."
      - "I've been through every passage in here. Twice."
      - "I won't slow you down. I'm fast, I'm quiet, and I can open anything."
      - "Besides — you're the first people I've seen in three days. I'm coming with you."
    on_complete:
      set_flag: npc_jep_joined
      join_party: jep

  - condition:
      requires: [npc_jep_joined]
    lines:
      - "Lead the way. Or I can. Actually let me — you'll walk into a trap."