    present:
      excludes: [npc_elise_joined]
    animation:
      mode: step
      speed: 0.7

  - id: guide_ellen
    name: "Guide Ellen"
    type: guide
    availability: 0.30
    dialogue: guide_ardel
    excuses: guide_excuses
