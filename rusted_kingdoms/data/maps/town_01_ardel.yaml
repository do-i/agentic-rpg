id: town_01_ardel
name: Ardel Village
bgm: town.default
inn:
  cost: 50
  position: [8, 5]

shop:
  items:
    - id: potion
      name: Potion
      buy_price: 100
      tags: [consumable, recovery]
      unlock_flag: story_quest_started
    - id: hi_potion
      name: Hi-Potion
      buy_price: 500
      tags: [consumable, recovery]
      unlock_flag: story_act2_started
    - id: ether
      name: Ether
      buy_price: 150
      tags: [consumable, recovery]
      unlock_flag: story_quest_started
    - id: tent
      name: Tent
      buy_price: 500
      tags: [consumable, recovery]
      unlock_flag: story_quest_started
    - id: antidote
      name: Antidote
      buy_price: 80
      tags: [consumable, status]
      unlock_flag: story_quest_started
    - id: echo_herb
      name: Echo Herb
      buy_price: 80
      tags: [consumable, status]
      unlock_flag: story_quest_started

npcs:
