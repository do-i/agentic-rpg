# data/party.yaml
#
# Single source of truth for every party member: stats, equipment, portrait,
# and recruit linkage. Loaded by:
#   - engine/io/game_state_loader.py     (from_new_game — protagonist)
#   - engine/world/world_map_logic.py    (apply_join_party — companions at runtime)
#   - engine/debug/debug_bootstrap.py    (inject_full_party — debug mode)
#   - engine/battle/battle_asset_cache.py (load_portrait)
#
# Schema:
#   id, name, class, protagonist?, portrait
#   join: { condition, map, position }
#   recruit?: { npc, dialogue, joined_flag }   # absent for the protagonist
#   row, level, exp, hp/hp_max, mp/mp_max
#   stats: { str, dex, con, int }
#   equipped: { weapon, shield, helmet, body, accessory }
#   abilities_unlocked, status_effects
#   age, gender                                # cosmetic, unused by engine

