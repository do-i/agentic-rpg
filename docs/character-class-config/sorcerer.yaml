        duration_turns: 1

  - id: tornado
    name: Tornado
    unlock_level: 50
    unlock_flag: story_ultimate_wind
    type: spell
    element: wind
    description: "Summons a catastrophic tornado. Massive damage to all enemies. Knockback guaranteed. 50% chance to stun."
    mp_cost: 30
