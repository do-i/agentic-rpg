# manifest
id: my_rpg_story
name: "Chronicles of the Lost Flame"
version: "1.0.0"

protagonist:
  id: hero_aric
  name: "Aric"  # player-renameable in New Game flow
  class: hero
  sprite: sprites/hero.png

party:
  members:
    - id: sera
      name: "Sera"
      class: sorcerer
      join_condition: story_quest_started   # joins immediately
      join_map: town_01
      join_position: [10, 6]

    - id: kael
      name: "Kael"
      class: warrior
      join_condition: story_act2_started
      join_map: town_02
      join_position: [8, 4]

    - id: lira
      name: "Lira"
      class: cleric
      join_condition: story_act3_started
      join_map: dungeon_03
      join_position: [5, 9]

    - id: zeph
      name: "Zeph"
      class: rogue
      join_condition: story_act4_started
      join_map: port_town
      join_position: [3, 7]

start:
  map: town_01
  position: [12, 8]

bootstrap_flags:
  - story_quest_started

refs:
  classes:   story_content/classes/
  maps:      story_content/maps/
  dialogue:  story_content/dialogue/
  items:     story_content/items/
  enemies:   story_content/enemies/
  loot:      story_content/loot/
  encount:   story_content/encount/
  recipe:    story_content/recipe/