# engine/settings/settings.yaml

display:
  screen_width: 1280
  screen_height: 766
  fps: 60

tiles:
  tile_size: 32

dialogue:
  text_speed: fast   # slow | fast | very_fast

saves:
  dir: ~/user_save_data

movement:
  smooth_collision: true   # axis-separation sliding on walls and NPCs

shop:
  mc_exchange_confirm_large: true   # show confirm dialog for L and XL cores

item:
  use_aoe_confirm: true   # confirm before applying all_alive items (Tent, Rest Capsule)

audio:
  bgm_enabled: true   # enable/disable background music
  sfx_enabled: true   # enable/disable sound effects

fonts:
  sizes:
    small:  20
    medium: 24
    large:  28
    xlarge: 32

debug:
  party:     true    # true = add all party members at new game start
  collision: false   # true = draw player collision rect overlay

enemy_spawn:
  global_interval: 30.0   # seconds between spawn ticks (overridden per-map or per-zone)
