# enemies/frost_dragon.yaml
ai:
  pattern: conditional
  moves:
    - condition:
        hp_pct_below: 1.0    # always available
      action: attack
      weight: 60
    - condition:
        hp_pct_below: 1.0
      action: ability
      id: frost_breath
      weight: 40
    - condition:
        hp_pct_below: 0.50   # phase 2
      action: ability
      id: blizzard_roar      # all-party attack
      weight: 60
    - condition:
        turn_mod:            # every 3rd turn
          every: 3
      action: ability
      id: ice_shield         # DEF buff